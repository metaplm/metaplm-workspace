version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: metaplm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       metaplm
      POSTGRES_USER:     metaplm
      POSTGRES_PASSWORD: metaplm_secret_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U metaplm -d metaplm"]
      interval: 5s
      timeout:  5s
      retries:  10

  # ── Database Migrations & Seed ───────────────────────────────────────────
  migrate:
    image: node:20-alpine
    container_name: metaplm-migrate
    working_dir: /app
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://metaplm:metaplm_secret_change_me@db:5432/metaplm
    command: >
      sh -c "
        apk add --no-cache openssl &&
        npm install --frozen-lockfile &&
        npx prisma migrate deploy &&
        npx ts-node --compiler-options '{\"module\":\"CommonJS\"}' prisma/seed.ts
      "
    depends_on:
      db:
        condition: service_healthy

  # ── Next.js Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metaplm-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://metaplm:metaplm_secret_change_me@db:5432/metaplm
      NODE_ENV:     production
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:     ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

volumes:
  postgres_data:
    driver: local
